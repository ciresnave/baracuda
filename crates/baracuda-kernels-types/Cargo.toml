[package]
name = "baracuda-kernels-types"
version = "0.0.1-alpha.59"
description = "Shared type vocabulary for the baracuda ML kernel facade: Element / IntElement / FpElement / BiasElement trait hierarchy, layout / epilogue / activation tags, MatrixRef / TensorRef views, PlanPreference, PrecisionGuarantee, and Workspace. Lifted from baracuda-cutlass so that baracuda-kernels and the per-library wrapper crates can share one vocabulary."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["cuda", "ml", "kernel", "types", "ffi"]
categories = ["api-bindings", "science"]
exclude = ["*.profraw", "target/"]

[dependencies]
baracuda-types = { workspace = true, features = ["half-crate", "f8-crate"] }
baracuda-driver = { workspace = true }
half = { workspace = true }
float8 = { workspace = true }
