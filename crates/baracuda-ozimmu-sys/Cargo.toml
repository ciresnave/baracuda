[package]
name = "baracuda-ozimmu-sys"
version = "0.0.1-alpha.70"
description = "Build + raw FFI bindings to baracuda's clean-fork of Hiroyuki Ootomo's ozIMMU — the Ozaki-scheme FP64 GEMM library that synthesizes a DGEMM from S² int8 tensor-core matmuls. Phase 44b internalized the upstream sources under `cuda/` (no more `vendor/` subdir; cutf submodule eliminated). Linked statically into the baracuda CUDA stack; consumed by the safe wrapper crate `baracuda-ozimmu`. MIT-licensed (original ozIMMU MIT — see `ATTRIBUTION.md`)."
readme = "README.md"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["cuda", "ozimmu", "dgemm", "ozaki", "ffi"]
categories = ["external-ffi-bindings", "science"]
links = "baracuda_ozimmu"
build = "build.rs"
exclude = [
    "*.profraw",
    "target/",
]

[features]
default = []

# Build the baracuda-owned ozIMMU source via nvcc. When OFF (the
# default), this crate is a no-op stub — the FFI extern blocks
# compile but link will only resolve if a downstream crate actually
# exercises them, which they won't unless they themselves opt into
# the `ozimmu` feature chain. Decoupled from `default` to keep
# `cargo check --workspace --no-default-features` cheap and
# platform-agnostic. Auto-enabled by `baracuda-ozimmu`'s `default`
# feature, which baracuda-cutlass's `ozimmu` feature ultimately
# pulls in.
build-vendor = []

[dependencies]
# baracuda-cuda-sys provides the cudaStream_t / cublasHandle_t opaque
# pointer typedefs that the FFI signatures need. baracuda-cublas-sys
# is pulled in for the cublasCreate_v2 / cublasGemmEx symbols that
# the static archive references at link time.
baracuda-cuda-sys = { workspace = true }
baracuda-cublas-sys = { workspace = true }

[build-dependencies]
baracuda-build = { workspace = true }
baracuda-forge = { workspace = true }

# docs.rs has no nvcc; the build.rs short-circuits on DOCS_RS=1.
[package.metadata.docs.rs]
no-default-features = true

[lints]
workspace = true
