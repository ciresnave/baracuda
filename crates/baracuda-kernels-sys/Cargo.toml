[package]
name = "baracuda-kernels-sys"
version = "0.0.1-alpha.57"
description = "Compiled bespoke .cu kernel template instantiations for the baracuda ML kernel facade plus C-ABI FFI facades for the library-backed plans (cuDNN conv/pool, cuSOLVER linalg, cuFFT/cuRAND, CUTLASS GEMM re-export). Hosts curated CUDA kernel sources (int8/FP8/int4/bin GEMM RRR, elementwise, reduce, norm, attention, …), builds them via baracuda-forge, exposes extern \"C\" entry points for the safe baracuda-kernels crate. CUTLASS template kernels live in the sibling baracuda-cutlass-kernels-sys crate and are re-exported here under the unified baracuda_kernels_gemm_* namespace."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["cuda", "kernel", "gemm", "ml", "ffi"]
categories = ["external-ffi-bindings", "science"]
links = "baracuda_kernels"
build = "build.rs"
# Belt-and-suspenders: prevent .profraw coverage files from accidentally
# being included in the crates.io tarball.
exclude = ["*.profraw", "target/"]

[features]
# Default to Ampere (sm_80) — runs on Ampere, Ada (RTX 40-series), and
# as forward-compatible fallback on Hopper if `sm_90a` isn't enabled.
default = ["sm80"]

# Build the sm_80 (Ampere / Ada-fallback) kernel set. Phase 24 forwards
# to baracuda-cutlass-kernels-sys/sm80 so the cutlass GEMM trampolines
# in `cutlass_reexport` resolve at link time.
sm80 = ["baracuda-cutlass-kernels-sys/sm80"]

# Build the sm_89 (Ada Lovelace) kernel set. Adds FP8 over sm_80.
sm89 = []

# Build the sm_90a (Hopper async) kernel set. Phase 24 forwards to
# baracuda-cutlass-kernels-sys/sm90a.
sm90a = ["baracuda-cutlass-kernels-sys/sm90a"]

# Link against cuDNN and expose the cuDNN FFI surface (Phase 7 conv /
# pool / CTC-cuDNN plans). Off by default because cuDNN is a separate
# NVIDIA download not bundled with the stock CUDA toolkit installer —
# enabling without cuDNN installed produces a linker error on
# `cudnn.lib` / `libcudnn.so`.
cudnn = []

# Phase 42 — Vendored Dao-AILab FlashAttention v2 (v2.8.3, BSD-3-Clause).
# Compiles the FA2 forward kernels for head_dim=128 + f16/bf16 (causal +
# non-causal) and exposes them through the `baracuda_kernels_fa2_sdpa_*`
# FFI surface. Off by default — FA2's CUTLASS-heavy templates add
# significant nvcc compile time (~5–15 min per .cu file on first build).
# Enable when you want the `FlashSdpaPlan` dispatch heuristic to be able
# to pick FA2 for long-context shapes (`seq_q * seq_k >= 1M`).
# Implies `sm80` (FA2 v2.8.3 requires Ampere or newer).
fa2 = ["sm80"]

# Phase 43 — Vendored AndreSlavescu/mHC.cu (MIT). Compiles the
# Manifold-Constrained Hyper-Connections layer (static-H FW Tier-1) and
# exposes it through `baracuda_kernels_mhc_layer_*` FFI symbols.
# Off by default — mHC pulls in cuBLAS-Lt (for the dynamic-H path's
# fused RMS+matmul) and adds ~30s of nvcc compile time. Enable when
# building HyperConnectionPlan into a transformer training stack.
# Implies `sm80` (Sinkhorn-Knopp + fused stream ops use cooperative
# groups; mHC.cu upstream tests target Ampere or newer).
mhc = ["sm80"]

# Phase 46 — Vendored FlashInfer (Apache-2.0). Compiles four launcher
# TUs covering: (1) batched paged-KV decode + paged-KV append,
# (2) sort-free top-K/top-P/min-P sampling, (3) cascade attention
# LSE merge. Surfaces 3 new plan families in baracuda-kernels:
# `BatchPagedDecodePlan`, `TopKTopPSamplingPlan`, `CascadeAttentionPlan`
# (each behind the same gate on baracuda-kernels). Off by default —
# FlashInfer's CUTLASS-free templates still add ~3-5 min of nvcc compile
# time per launcher on first build. Implies `sm80` (FlashInfer's
# `cp.async` + `mma.sync` paths target Ampere or newer).
flashinfer = ["sm80"]

# Phase 50 — Vendored state-spaces/mamba SSD chunk-scan (Apache-2.0)
# and Dao-AILab causal-conv1d (BSD-3-Clause). Opens the state-space LLM
# class (Mamba-2 8B, Codestral-Mamba, Falcon-Mamba, Zamba2). Compiles
# the bespoke `baracuda_kernels_causal_conv1d_*` and
# `baracuda_kernels_ssd_chunk_scan_*` FFI surfaces. Mamba-1
# `selective_scan` is OUT OF SCOPE for Phase 50 (deferred to Phase 50b
# pending a v1-specific consumer). Off by default — adds ~30s of nvcc
# compile time. Implies `sm80` (atomicAdd for f16/bf16 requires it).
mamba = ["sm80"]

# Phase 53 — Vendored bitsandbytes NF4 (NormalFloat 4-bit) dequant +
# GEMV kernels (MIT, Dettmers et al. arXiv:2305.14314). Opens
# QLoRA-trained Llama / Mistral / Qwen inference on the dominant 4-bit
# format on the Hugging Face Hub. Compiles the bespoke
# `baracuda_kernels_nf4_dequantize_*` and `baracuda_kernels_nf4_gemv_*`
# FFI surfaces. Different from GGUF Q4_0 (symmetric int4 * scale) and
# AWQ int4 (asymmetric int4 + zero-points): NF4 uses a 16-entry
# non-uniform quantile codebook. Off by default — adds ~10s of nvcc
# compile time. No arch implication (the kernels are sm_75+ but the
# baracuda kernel ABI requires at least sm80 — gating on `sm80`
# matches the rest of the kernel surface).
bnb_nf4 = ["sm80"]

# Phase 54 — Clean-room hand-port of facebookresearch/xFormers
# (BSD-3-Clause) BlockSparseAttention algorithmic reference. Block-
# sparse SDPA FW where the attention mask is a per-block boolean
# pattern; only the active (q_block, k_block) pairs participate in the
# QK^T matmul. Compiles the bespoke
# `baracuda_kernels_sdpa_{f32,f16,bf16,f64}_block_sparse_*` FFI surface.
# Off by default — adds ~30s of nvcc compile time. Implies `sm80` (uses
# Phase 6.6 online-softmax tile pipeline). Independent from
# `xformers_sparse24`. Attribution + LICENSE at `vendor/xformers/` (no
# upstream sources vendored verbatim).
xformers_blocksparse = ["sm80"]

# Phase 54 — Clean-room hand-port of facebookresearch/xFormers
# (BSD-3-Clause) 2:4 Structured Sparsity GEMM algorithmic reference.
# Trailblazer uses an inflate-then-dense matmul path (correctness
# first); sparse-tensor-core perf via `mma.sp.sync` / cuSPARSELt
# deferred to Tier 2. Compiles the bespoke
# `baracuda_kernels_gemm_{f32,f16,bf16}_sparse24_*` FFI surface. Off by
# default. Implies `sm80` (2:4 sparse tensor cores require Ampere; the
# trailblazer's inflate path is arch-agnostic but we keep the gate
# uniform with `xformers_blocksparse`).
xformers_sparse24 = ["sm80"]

[dependencies]
# Phase 24 — cutlass GEMM FFI re-export. Pull in the CUTLASS template
# instantiations so the unified `baracuda_kernels_gemm_*` namespace can
# trampoline to them. Different `links` key (`baracuda_cutlass_kernels`
# vs `baracuda_kernels`) so the two static archives co-exist without
# Cargo's links-conflict guard tripping.
baracuda-cutlass-kernels-sys = { workspace = true }
# Phase 42 — direct dep on baracuda-cutlass-sys so this crate's build.rs
# receives `DEP_CUTLASS_INCLUDE` (the resolved CUTLASS headers dir). Only
# read when the `fa2` feature is on; otherwise this dep is a passive
# version-pin and a no-op at compile time.
baracuda-cutlass-sys = { workspace = true }

[build-dependencies]
baracuda-forge = { workspace = true }

# docs.rs builds with --all-features by default; we only want the
# baseline (sm80) build to be attempted on docs.rs.
[package.metadata.docs.rs]
features = ["sm80"]
no-default-features = false
