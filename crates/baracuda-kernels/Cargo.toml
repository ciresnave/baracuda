[package]
name = "baracuda-kernels"
version = "0.0.1-alpha.57"
description = "Unified ML op facade for the baracuda CUDA ecosystem. Exposes every primitive an ML framework would expect (union of PyTorch torch.* + nn.functional and JAX lax.* / numpy ops) through a single Plan-based Rust surface, internally dispatching to baracuda-cutlass, the baracuda-* NVIDIA-library wrappers, or bespoke baracuda-kernels-sys kernels."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["cuda", "gpu", "ml", "kernel", "pytorch"]
categories = ["api-bindings", "science"]
exclude = ["*.profraw", "target/"]

[features]
default = ["sm80"]

# Architecture features forwarded to the bespoke kernel crate.
sm80 = ["baracuda-kernels-sys/sm80", "baracuda-cutlass/sm80"]
sm89 = ["baracuda-kernels-sys/sm89"]
sm90a = ["baracuda-kernels-sys/sm90a", "baracuda-cutlass/sm90a"]

# cuDNN integration â€” forwards to baracuda-kernels-sys/cudnn. Off by
# default because cuDNN is a separate NVIDIA download not bundled with
# the stock CUDA toolkit. Pulls in Conv2d, Pool2d, and the CtcLoss
# cuDNN-sibling plans.
cudnn = ["baracuda-kernels-sys/cudnn"]

# Phase 42 â€” vendored Dao-AILab FlashAttention v2 (BSD-3-Clause). Adds
# a backend choice to `FlashSdpaPlan` that picks FA2 for long-context
# shapes (`seq_q * seq_k >= 1M`) at head_dim=128 in f16/bf16; the
# bespoke path stays the default for small / decode shapes. Off by
# default because FA2's CUTLASS-heavy templates add significant build
# time. Forwards to `baracuda-kernels-sys/fa2`.
fa2 = ["baracuda-kernels-sys/fa2"]

# Phase 43 â€” vendored AndreSlavescu/mHC.cu (MIT). Exposes the
# `HyperConnectionPlan` op family (manifold-constrained
# hyper-connections, drop-in replacement for transformer residual
# connections). Forwards to `baracuda-kernels-sys/mhc`. Off by default;
# adds ~30s of nvcc compile time and pulls in cuBLAS-Lt at link time
# (which is already a baracuda dependency through the cuSOLVER
# requirement chain, so no new transitive link surface).
mhc = ["baracuda-kernels-sys/mhc"]

# Phase 46 â€” vendored FlashInfer (Apache-2.0). Exposes three new plan
# families: `BatchPagedDecodePlan` (batched paged-KV decode for vLLM-
# style serving), `TopKTopPSamplingPlan` (sort-free combined top-K /
# top-P / min-P sampling for the decode hot path), and
# `CascadeAttentionPlan` (LSE-merge for prefix-cache sharing across
# requests). Forwards to `baracuda-kernels-sys/flashinfer`. Off by
# default â€” FlashInfer's template-heavy headers add ~3-5 min of nvcc
# compile time per launcher on first build. Existing
# `FlashSdpaPlan` / `SdpaPlan` / `WriteSlicePlan` / `KvCacheAppendPlan`
# (contiguous KV) stay as-is; the new plans sit alongside.
flashinfer = ["baracuda-kernels-sys/flashinfer"]

# Phase 44 â€” vendored ozIMMU (MIT). Adds the `BackendKind::Ozaki { slices }`
# dispatch arm to FP64 GEMM, synthesizing a DGEMM from `SÂ˛` int8 tensor-
# core matmuls (Ozaki scheme). Forwards to the `ozimmu` feature on
# `baracuda-cutlass` (where `GemmPlan` lives). Opt-in because the accuracy
# contract differs from native DGEMM (comparable at `S>=8` on well-
# conditioned inputs; NOT bit-exact) and the vendored library adds ~30s
# of nvcc compile time. Default FP64 path stays on CUTLASS / cuBLAS.
ozimmu = ["baracuda-cutlass/ozimmu"]

# Phase 49 â€” vendored NVIDIA Apex multi-tensor optimizer kernels (BSD-3-Clause).
# Deliberate scope expansion: training-framework-adjacent. When ON, pulls in
# the sibling `baracuda-optim` crate as an optional dep and re-exports its
# `AdamStepPlan`, `LambStepPlan`, `SgdStepPlan`, and `TensorList` types into
# the kernel facade under the `optim` module. Off by default so inference-
# only consumers (e.g. Fuel) don't pay the FFI surface cost â€” the optim
# vendored sources only build / link when the feature is enabled.
# Implies the arch feature on `baracuda-optim` to match the kernel-side
# default (sm80).
optim = ["dep:baracuda-optim", "baracuda-optim/sm80"]

# Phase 55 â€” NVIDIA TransformerEngine FP8 cast/transpose + delayed-scaling
# recipe primitives (Apache-2.0). When ON, pulls in the sibling
# `baracuda-transformer-engine` crate as an optional dep and re-exports
# its `Fp8Recipe` / `Fp8CastPlan` / `Fp8DequantPlan` / `Fp8Format` /
# `Fp8WideDtype` into the kernel facade under the `transformer_engine`
# module. Off by default â€” the recipe machinery is opt-in (training stacks
# want it; inference-only consumers without delayed-scaling do not). Cast
# / recipe subset only; `normalization` / `fused_attn` / `fused_rope` /
# `activation` / `gemm` overlap existing baracuda phases and are NOT
# brought in. Sm_89 caveat: FP8 wins are bandwidth-saving only on Ada;
# tensor-core FP8 MMA throughput == BF16. Forward-compatible with Hopper
# / Blackwell.
tensor_engine = ["dep:baracuda-transformer-engine", "baracuda-transformer-engine/sm80"]

# Phase 50 â€” Mamba-2 SSD chunk-scan + Dao-AILab causal-conv1d. Opens the
# state-space LLM class (Mamba-2 8B, Codestral-Mamba, Falcon-Mamba,
# Zamba2 â€” Mamba-1 selective_scan deferred to Phase 50b). Adds
# `SsdChunkScanPlan` + `SsdChunkScanBackwardPlan` (lives under
# `attention` because of the SSD-as-attention duality) and
# `CausalConv1dPlan` + `CausalConv1dBackwardPlan` (top-level module â€”
# bespoke kernels with no cuDNN dependency). Forwards to
# `baracuda-kernels-sys/mamba`.
mamba = ["baracuda-kernels-sys/mamba"]

# Phase 54 â€” xFormers (BSD-3-Clause) BlockSparseAttention algorithmic
# reference, clean-room hand-port. Exposes the `SdpaBlockSparsePlan`
# family â€” block-sparse SDPA FW where the attention mask is a per-block
# boolean pattern; only the active (q_block, k_block) pairs participate
# in the QK^T matmul + softmax accumulation. Different from Phase 51's
# arbitrary additive-mask path (which still computes every (Q, K) cell
# and adds bias) â€” block-sparse actually SKIPS computation on masked
# blocks â†’ real wall-clock speedup on long-context attention with known
# sparse patterns. Off by default; independent from `xformers_sparse24`.
# Forwards to `baracuda-kernels-sys/xformers_blocksparse`.
xformers_blocksparse = ["baracuda-kernels-sys/xformers_blocksparse"]

# Phase 54 â€” xFormers (BSD-3-Clause) 2:4 Structured Sparsity GEMM
# algorithmic reference, clean-room hand-port. Exposes the
# `GemmSparse24Plan` family â€” accepts a pre-compressed `[M, K/2]` weight
# tensor + `[M, K/8]` u16 metadata describing the 2-of-4 non-zero
# positions. Trailblazer uses an inflate-then-dense matmul path
# (correctness first); sparse-tensor-core perf via `mma.sp.sync` /
# cuSPARSELt deferred to Tier 2. Off by default; independent from
# `xformers_blocksparse`. Forwards to
# `baracuda-kernels-sys/xformers_sparse24`.
xformers_sparse24 = ["baracuda-kernels-sys/xformers_sparse24"]

# Phase 53 â€” bitsandbytes NF4 (NormalFloat 4-bit) dequant + GEMV.
# Opens QLoRA-trained Llama / Mistral / Qwen inference on the dominant
# 4-bit format on the Hugging Face Hub. Adds `Nf4DequantizePlan<T>` +
# `Nf4MmvqPlan<T>` + `Nf4MmvqMultiMPlan<T>` (each for f16/bf16
# activations). Different from GGUF Q4_0 (symmetric int4 * scale,
# Phase 8) and AWQ int4 (asymmetric int4 + zero-points): NF4 uses a
# 16-entry non-uniform quantile codebook. Forwards to
# `baracuda-kernels-sys/bnb_nf4`. Off by default.
bnb_nf4 = ["baracuda-kernels-sys/bnb_nf4"]

[dependencies]
baracuda-kernels-types = { workspace = true }
baracuda-kernels-sys = { workspace = true }
baracuda-cutlass = { workspace = true }
baracuda-driver = { workspace = true }
baracuda-types = { workspace = true, features = ["half-crate", "f8-crate"] }
baracuda-optim = { workspace = true, optional = true }
baracuda-transformer-engine = { workspace = true, optional = true }
half = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
float8 = { workspace = true }
# erf / erff for the unary GELU smoke test's CPU reference (Rust stable
# does not expose `erf` from std).
libm = "0.2"

[package.metadata.docs.rs]
features = ["sm80"]
no-default-features = false
