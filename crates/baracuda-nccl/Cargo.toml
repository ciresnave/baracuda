[package]
name = "baracuda-nccl"
version = "0.0.1-alpha.5"
description = "Safe Rust wrappers for NVIDIA NCCL (multi-GPU collective communication)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
# Opt-in NcclScalar impls for `half::f16` and `half::bf16`. Transitively
# enables `baracuda-types`'s half-crate feature so DeviceRepr is in
# place on these types.
half-crate = ["dep:half", "baracuda-types/half-crate"]

[dependencies]
baracuda-types.workspace = true
baracuda-core.workspace = true
baracuda-cuda-sys.workspace = true
baracuda-nccl-sys.workspace = true
baracuda-driver.workspace = true
thiserror.workspace = true
half = { workspace = true, optional = true }
