[package]
name = "baracuda-megatron"
version = "0.0.1-alpha.64"
description = "Megatron-LM-style tensor-parallel primitives (Column / Row Parallel Linear) for the baracuda CUDA stack. Pure-composition crate — local GEMM via baracuda-cublas + cross-rank collectives via baracuda-nccl. No new CUDA kernels. NEW in Phase 57; deliberate scope expansion (distributed-training-framework-adjacent). Off-by-default in baracuda-kernels via the `megatron_tp` cargo feature so non-distributed consumers don't pay the dep surface cost. Algorithmic reference: Shoeybi et al. arXiv:1909.08053 (NVIDIA Megatron-LM, Apache-2.0)."
readme = "README.md"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["cuda", "megatron", "tensor-parallel", "distributed", "transformer"]
categories = ["api-bindings", "science"]
exclude = ["*.profraw", "target/"]

[features]
default = []

# Opt-in f16 / bf16 dtype impls — transitively enables the matching
# half-crate features on baracuda-types, baracuda-nccl, and
# baracuda-kernels. Off by default so consumers that only need f32
# don't pay the dep surface.
half-crate = [
    "dep:half",
    "baracuda-types/half-crate",
    "baracuda-nccl/half-crate",
]

[dependencies]
baracuda-driver = { workspace = true }
baracuda-cublas = { workspace = true }
baracuda-nccl = { workspace = true }
baracuda-types = { workspace = true }
half = { workspace = true, optional = true }
thiserror = { workspace = true }

[package.metadata.docs.rs]
no-default-features = true

[lints]
workspace = true
