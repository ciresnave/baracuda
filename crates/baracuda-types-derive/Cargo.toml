[package]
name = "baracuda-types-derive"
version = "0.0.1-alpha.71"
description = "Proc-macros for baracuda-types (#[derive(DeviceRepr)], #[derive(KernelArg)])."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
proc-macro = true

[dependencies]
proc-macro2.workspace = true
quote.workspace = true
syn.workspace = true

# Dev-only: pull `baracuda-types` (with the `derive` feature) so the
# integration tests can drive the proc-macro through its emitted path
# `::baracuda_types::DeviceRepr`. A dev-dep cycle back to the parent
# crate is legal in Cargo and only affects the test build, not the
# publish artifact.
#
# Declared path-only (NOT `workspace = true`) on purpose: a versioned
# requirement here makes `cargo publish` (1.90+) refuse to publish this
# crate until `baracuda-types` of the same version is already on the
# registry — but `baracuda-types` depends on this crate, so neither can
# go first. cargo drops path-only dev-dependencies from the published
# manifest, which breaks that publish cycle while keeping `cargo test`
# working locally.
[dev-dependencies]
baracuda-types = { path = "../baracuda-types", features = ["derive"] }

[lints]
workspace = true
