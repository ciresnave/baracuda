[package]
name = "baracuda-types"
version = "0.0.1-alpha.5"
description = "Shared type vocabulary for the baracuda CUDA stack (Half/BFloat16/Complex, DeviceRepr, CudaVersion, Feature, CudaStatus)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
derive = ["dep:baracuda-types-derive"]
half-crate = ["dep:half"]
num-complex-crate = ["dep:num-complex"]
bytemuck = ["dep:bytemuck"]
# Opt-in support for the `float8` crate's 8-bit floating-point types
# (F8E4M3, F8E5M2). Adds DeviceRepr + ValidAsZeroBits; &T: KernelArg
# falls out of the existing blanket impl for any T: DeviceRepr.
f8-crate = ["dep:float8"]

[dependencies]
baracuda-types-derive = { workspace = true, optional = true }
half = { workspace = true, optional = true }
num-complex = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }
float8 = { workspace = true, optional = true }
